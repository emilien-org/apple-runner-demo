name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Packaging de l'Application
        run: |
          # Définition du chemin source dans l'archive
          APP_PATH="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          
          # Vérification de la présence de l'App
          if [ ! -d "$APP_PATH" ]; then
            echo "Erreur : L'application n'a pas été trouvée dans l'archive."
            exit 1
          fi

          # Création du ZIP avec ditto (préserve les permissions et métadonnées)
          # On évite l'étape 'cp -R' pour gagner du temps et de l'espace
          ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_ARM64.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_macOS_Silicon
          path: DemoRunner_ARM64.zip
          if-no-files-found: error
