name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation via Archive
        run: |
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./DemoRunner.xcarchive \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extraction et Packaging Correct
        run: |
          # 1. On récupère l'app
          cp -R ./DemoRunner.xcarchive/Products/Applications/DemoRunner.app ./DemoRunner.app
          
          # 2. On crée le ZIP en pointant sur le .app (et pas ce qu'il y a dedans)
          # La commande 'ditto' est cruciale ici
          ditto -c -k --sequesterRsrc ./DemoRunner.app DemoRunner_Final.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MonApp_macOS
          path: DemoRunner_Final.zip
