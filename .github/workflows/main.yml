name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
    
    - name: Identification du Hardware (Scaleway)
        run: |
          echo "--- Modèle du Mac ---"
          sysctl -n hw.model
          sw_vers

      - name: Compilation et Archivage
        run: |
          rm -rf ./build
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner
          path: build/Build/Products/Release/DemoRunner.app
          if-no-files-found: error
