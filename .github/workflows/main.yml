name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Nettoyage
        run: rm -rf build/ DemoRunner.xcarchive DemoRunner_macOS.zip DemoRunner.app

      - name: Compilation via Archive
        run: |
          # On force MACOSX_DEPLOYMENT_TARGET à 14.0 pour être sûr que ton Mac puisse l'ouvrir
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./DemoRunner.xcarchive \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGN_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extraction et Packaging
        run: |
          cp -R ./DemoRunner.xcarchive/Products/Applications/DemoRunner.app ./DemoRunner.app
          # On vérifie visuellement la version dans les logs
          /usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" ./DemoRunner.app/Contents/Info.plist
          ditto -c -k --sequesterRsrc ./DemoRunner.app DemoRunner_macOS.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-macOS
          path: DemoRunner_macOS.zip
