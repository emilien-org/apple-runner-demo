name: Build DemoRunner
on: [push, workflow_dispatch]

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Identification du Hardware (Scaleway)
        run: |
          echo "--- Modèle du Mac ---"
          sysctl -n hw.model
          echo "--- Nombre de cœurs CPU ---"
          sysctl -n hw.ncpu
          echo "--- Version de macOS ---"
          sw_vers

      - name: Compilation (Xcode)
        run: |
          xcodebuild -project DemoRunner.xcodeproj \
                     -scheme DemoRunner \
                     -configuration Release \
                     -derivedDataPath ./build \
                     CODE_SIGNING_ALLOWED=NO

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-Compilee
          # On cherche tous les fichiers .app dans le dossier build, peu importe la profondeur
          path: DemoRunner/build/**/*.app
          # Optionnel : empêche l'étape d'échouer si le fichier est manquant (pour le debug)
          if-no-files-found: error
