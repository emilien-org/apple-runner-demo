name: Build DemoRunner Multi-Platform
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- JOB MACOS (Votre job actuel) ---
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage macOS
        run: |
          rm -rf ./build
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Création du ZIP macOS
        run: |
          APP_PATH="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_macOS.zip

      - name: Archivage Artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_App_MacOS
          path: DemoRunner_macOS.zip

  # --- NOUVEAU JOB : IOS SIMULATOR ---
  ios-simulator-build:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation pour Simulateur iOS
        run: |
          # Le simulateur utilise 'build' et non 'archive'
          # On cible l'architecture du simulateur iPhone
          xcodebuild build \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Création du ZIP iOS Simulator
        run: |
          # Le chemin diffère pour le simulateur dans DerivedData
          APP_PATH="./build/DerivedData/Build/Products/Release-iphonesimulator/DemoRunner.app"
          
          if [ -d "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_iOS_Simulator.zip
          else
            echo "Erreur : App simulateur introuvable."
            exit 1
          fi

      - name: Archivage Artifact iOS
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_App_iOS_Sim
          path: DemoRunner_iOS_Simulator.zip
