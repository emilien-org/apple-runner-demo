name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Nettoyage des dossiers
        run: |
          rm -rf build/
          rm -rf DemoRunner.xcarchive
          rm -f DemoRunner_macOS.zip

      - name: Création de l'Archive (Full Bundle)
        run: |
          # L'action 'archive' regroupe TOUT : code, assets, et infos de rendu
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./DemoRunner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extraction et Packaging
        run: |
          # On extrait l'application du dossier d'archive vers la racine
          cp -R ./DemoRunner.xcarchive/Products/Applications/DemoRunner.app ./DemoRunner.app
          
          # On vérifie la présence du binaire avant de zipper
          ls -l ./DemoRunner.app/Contents/MacOS/DemoRunner
          
          # On compresse avec 'ditto' pour garder les droits macOS intacts
          ditto -c -k --sequesterRsrc ./DemoRunner.app DemoRunner_macOS.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-macOS-Complete
          path: DemoRunner_macOS.zip
          retention-days: 5
