name: Build DemoRunner macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          # Nettoyage des anciens builds pour éviter les conflits
          rm -rf ./build ./export_zip
          
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Packaging (Conservation des permissions)
        run: |
          APP_SRC="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          
          if [ ! -d "$APP_SRC" ]; then
            echo "Erreur : L'application n'a pas été trouvée."
            exit 1
          fi

          # 1. On crée un dossier dédié à l'export
          mkdir -p ./export_zip
          
          # 2. On compresse avec 'ditto' : 
          # - Préserve les permissions UNIX (évite le chmod manuel)
          # - Préserve les ressources macOS (icônes, métadonnées)
          # - Inclut le dossier .app à la racine du zip
          ditto -c -k --sequesterRsrc "$APP_SRC" ./export_zip/DemoRunner_Silicon.zip
          
          echo "Packaging terminé : ./export_zip/DemoRunner_Silicon.zip"

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_macOS_Silicon
          # On pointe sur le DOSSIER export_zip.
          # GitHub va zipper le contenu de ce dossier.
          # Vous n'aurez qu'un seul fichier à l'intérieur : votre zip prêt à l'emploi.
          path: ./export_zip/
          if-no-files-found: error
