name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Nettoyage
        run: rm -rf build/ DemoRunner_macOS.zip

      - name: Compilation (Xcode)
        run: |
          xcodebuild clean build \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Compression de l'App
        run: |
          # On cherche l'app dans le dossier build et on crée le zip à la racine
          # La commande 'find' permet d'être sûr de localiser le .app peu importe la profondeur
          APP_PATH=$(find build -name "DemoRunner.app" -type d | head -n 1)
          echo "App trouvée ici : $APP_PATH"
          ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_macOS.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-macOS
          path: DemoRunner_macOS.zip
