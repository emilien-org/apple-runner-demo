name: Build DemoRunner
on: [push, workflow_dispatch]

# On définit la variable globale pour Node.js 24 ici
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Identification du Hardware (Scaleway)
        run: |
          echo "--- Modèle du Mac ---"
          sysctl -n hw.model
          sw_vers

      - name: Compilation (Xcode)
        run: |
          xcodebuild clean build \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-Compilee
          # CORRECTION : On retire 'DemoRunner/' au début
          path: build/Build/Products/Release/DemoRunner.app
