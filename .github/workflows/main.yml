name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Nettoyage des anciens builds
        run: rm -rf build/

      - name: Compilation (Xcode)
        run: |
          xcodebuild clean build \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Compression de l'App
        # On utilise une commande zip qui préserve les droits d'exécution macOS
        run: |
          cd build/Build/Products/Release/
          ditto -c -k --sequesterRsrc DemoRunner.app ../../../DemoRunner_macOS.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-macOS
          path: DemoRunner_macOS.zip
