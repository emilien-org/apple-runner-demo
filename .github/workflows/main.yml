name: Build DemoRunner macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          rm -rf ./build
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Packaging (Conservation des permissions)
        run: |
          APP_PATH="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Erreur : App non trouvée."
            exit 1
          fi

          # On utilise ditto pour créer le zip car il préserve les permissions (+x)
          # On crée DemoRunner.app.zip qui contiendra le dossier .app
          ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_Silicon.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_Final_Package
          # On upload le fichier ZIP lui-même, pas le dossier.
          # GitHub ne le re-zippera pas.
          path: DemoRunner_Silicon.zip
          if-no-files-found: error
