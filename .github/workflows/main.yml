name: Build DemoRunner macOS
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          rm -rf ./build
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Création du ZIP (Structure & Permissions)
        run: |
          APP_PATH="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          # ditto crée un zip qui contient le dossier .app (pas juste Contents)
          # et il garde le bit d'exécution (+x)
          ditto -c -k --sequesterRsrc "$APP_PATH" DemoRunner_Silicon.zip

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_App_Export
          # On pointe DIRECTEMENT sur le fichier .zip
          path: DemoRunner_Silicon.zip
          if-no-files-found: error
