name: Build DemoRunner
on: [push, workflow_dispatch]

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Identification du Hardware (Scaleway)
        run: |
          echo "--- Modèle du Mac ---"
          sysctl -n hw.model
          echo "--- Nombre de cœurs CPU ---"
          sysctl -n hw.ncpu
          echo "--- Version de macOS ---"
          sw_vers

      - name: Compilation (Xcode)
        run: |
          cd DemoRunner
          # On force un dossier de sortie très simple nommé 'output'
          xcodebuild -project DemoRunner.xcodeproj \
                     -scheme DemoRunner \
                     -configuration Release \
                     -derivedDataPath ./output \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Localisation du binaire (Debug)
        run: |
          echo "--- Contenu du dossier output ---"
          find DemoRunner/output -name "*.app"
          
      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: App-Compilee
          # On prend tout ce qui ressemble à une App dans le dossier output
          path: DemoRunner/output/**/*.app
