name: Build DemoRunner macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          rm -rf ./build
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Preparation du dossier d'export
        run: |
          APP_SRC="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          
          if [ ! -d "$APP_SRC" ]; then
            echo "Erreur : L'application n'a pas été trouvée."
            exit 1
          fi

          # On crée un dossier 'export' et on copie l'application DEDANS
          # La structure sera : ./export/DemoRunner.app/Contents/...
          mkdir -p ./export
          cp -R "$APP_SRC" ./export/

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_macOS_Silicon
          # IMPORTANT : En pointant sur ./export/, l'artifact contiendra
          # le dossier DemoRunner.app et tout son contenu.
          path: ./export/
          if-no-files-found: error
