name: Build DemoRunner macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Compilation et Archivage
        run: |
          # On s'assure que le dossier de build est propre
          rm -rf ./build
          
          xcodebuild archive \
            -project DemoRunner.xcodeproj \
            -scheme DemoRunner \
            -configuration Release \
            -archivePath ./build/DemoRunner.xcarchive \
            -derivedDataPath ./build/DerivedData \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean archive

      - name: Preparation du dossier d'export
        run: |
          APP_PATH="./build/DemoRunner.xcarchive/Products/Applications/DemoRunner.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Erreur : L'application n'a pas été trouvée dans l'archive."
            exit 1
          fi

          # On crée un dossier temporaire pour l'artifact
          # Cela évite d'uploader tout le dossier de build Xcode qui est énorme
          mkdir -p ./dist
          cp -R "$APP_PATH" ./dist/

      - name: Archivage pour GitHub
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner_macOS_Silicon
          # En pointant sur le dossier .app, GitHub crée un ZIP
          # qui contient directement DemoRunner.app à sa racine.
          path: ./dist/DemoRunner.app
          if-no-files-found: error
